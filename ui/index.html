<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFM 2.0 | Liquid Foundation Models</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="app-container">
        <header>
            <div class="logo">LFM <span>2.0</span></div>
            <nav>
                <a href="#" class="active">Playground</a>
                <a href="#">Architecture</a>
                <a href="#">Benchmarks</a>
            </nav>
        </header>
        
        <main>
            <section class="hero">
                <h1>Next-Gen Liquid Intelligence</h1>
                <p>Experience the power of Gated Short Convolutions and GQA in our most advanced Foundation Model yet.</p>
            </section>

            <section class="playground">
                <div class="controls-panel glass-card">
                    <h3>Model Configuration</h3>
                    <div class="control-group">
                        <label>Model Version</label>
                        <select id="model-select">
                            <option value="lfm2-350m">LFM 2.0 350M</option>
                            <option value="lfm2-700m">LFM 2.0 700M</option>
                            <option value="lfm2-1.3b">LFM 2.0 1.3B</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>Max Tokens: <span id="token-value">50</span></label>
                        <input type="range" id="token-range" min="10" max="500" value="50">
                    </div>
                    <div class="control-group">
                        <label>Temperature: <span id="temp-value">0.7</span></label>
                        <input type="range" id="temp-range" min="0" max="1.5" step="0.1" value="0.7">
                    </div>
                    <button id="generate-btn" class="primary-btn">Generate Response</button>
                </div>

                <div class="input-panel glass-card">
                    <textarea id="prompt-input" placeholder="Enter your prompt here..."></textarea>
                </div>

                <div class="output-panel glass-card">
                    <div class="output-header">
                        <span>LFM 2.0 Output</span>
                        <div class="output-actions">
                            <span id="output-timer">0.0s</span>
                            <button class="icon-btn">Copy</button>
                        </div>
                    </div>
                    <div id="output-content" class="output-content">
                        <span class="placeholder-text">Generated text will appear here...</span>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="status-bar">
                <span class="status-dot"></span>
                <span class="status-text">System Ready</span>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
